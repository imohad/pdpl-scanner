# Publishes pdpl-scanner to PyPI when a GitHub Release is published.
#
# One-time setup (no API tokens needed — uses OIDC "trusted publishing"):
#   1. Build the project once and create the project on PyPI, OR pre-register it as a
#      "pending publisher" at https://pypi.org/manage/account/publishing/ with:
#         PyPI project name: pdpl-scanner
#         Owner: imohad   Repository: pdpl-scanner
#         Workflow name: publish.yml   Environment: pypi
#   2. In the repo: Settings → Environments → create an environment named "pypi".
#   3. Cut a GitHub Release (e.g. v1.1.0). This workflow builds and uploads automatically.
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing — no PyPI token stored in the repo
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
