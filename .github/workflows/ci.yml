name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Self-scan smoke test (dogfood)
        # The scanner's own source is keyword-dense by nature (it ships PII keyword tables and
        # many print() statements), so it legitimately flags itself under its high-recall
        # heuristics — a clean PASS here is neither expected nor meaningful. This step instead
        # confirms the CLI runs end-to-end and writes a report; only an actual crash fails CI.
        run: |
          set +e
          pdpl-scan pdpl_scanner --entity private_general --markdown self-scan-report.md
          code=$?
          if [ "$code" -gt 1 ]; then echo "::error::CLI crashed (exit $code)"; exit "$code"; fi
          test -s self-scan-report.md && echo "Self-scan report written OK (exit $code)."
